<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#ff2d95"/>
    </linearGradient>
    <linearGradient id="flow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="80"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="url(#flow)" stroke-width="1.5" opacity="0.15" filter="url(#glow)"/>

  <!-- AI hexagon background -->
  <polygon points="200,70 300,120 300,220 200,270 100,220 100,120"
           fill="none" stroke="url(#flow)" stroke-width="2" opacity="0.12" filter="url(#glow)"/>

  <!-- Main arrow-flow symbol: letter 'a' + 'f' + arrow -->
  <!-- Vertical flowing stream -->
  <path d="M 200,320 Q 200,280 200,260 Q 200,230 220,210 Q 240,190 240,160
           Q 240,130 220,110 Q 200,90 180,90 Q 160,90 150,105"
        fill="none" stroke="url(#flow)" stroke-width="8" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Branch that splits off (the 'f' crossbar) -->
  <path d="M 220,150 Q 260,145 290,160 Q 310,170 320,190"
        fill="none" stroke="url(#flow2)" stroke-width="7" stroke-linecap="round"
        filter="url(#glowSoft)"/>

  <!-- Arrowhead -->
  <polygon points="145,95 155,110 165,100"
           fill="url(#flow)" filter="url(#glow)"/>

  <!-- Small dots representing workflow steps -->
  <circle cx="200" cy="270" r="6" fill="#00d4ff" opacity="0.8" filter="url(#glowSoft)"/>
  <circle cx="230" cy="210" r="5" fill="#7b2ff7" opacity="0.8" filter="url(#glowSoft)"/>
  <circle cx="205" cy="140" r="4" fill="#ff2d95" opacity="0.8" filter="url(#glowSoft)"/>
  <circle cx="290" cy="168" r="3" fill="#00d4ff" opacity="0.7" filter="url(#glowSoft)"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="320" x2="320" y2="320" stroke="#7b2ff7" stroke-width="0.5" opacity="0.08"/>
  <line x1="80" y1="330" x2="300" y2="330" stroke="#00d4ff" stroke-width="0.3" opacity="0.06"/>
</svg>
